<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mackinac Bill Tracker — Strategic Build Plan</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Build-plan navy family + mockup amber accent (no exact repo token for orange-amber) */
    --navy: #1A3A5C;
    --navy-deep: #0f2438;
    --amber: #e8973a;
    --amber-light: #fdf3e4;
    --amber-border: #f0c896;
    --blue-light: #eef4fb;
    --blue-border: #c7dcf0;
    --text-dark: #1a2233;
    --text-mid: #4a5568;
    --text-soft: #6b7585;
    --border: #e3e6ec;
    --bg: #f4f6f9;
    --card-bg: #ffffff;
    --pill-foundation: #dbe6f7; --pill-foundation-text: #2f5596;
    --pill-schema: #dbe6f7; --pill-schema-text: #2f5596;
    --pill-discovery: #fbdcdc; --pill-discovery-text: #b3322f;
    --pill-phase1: #e6dcf7; --pill-phase1-text: #6b3fa0;
    --pill-phase1kpi: #d8efe1; --pill-phase1kpi-text: #237a4e;
    --pill-phase2: #fdebcf; --pill-phase2-text: #b6730f;
    --pill-phase3: #e3f1d8; --pill-phase3-text: #5a7d2e;
    --pill-roadmap: #e7e9ed; --pill-roadmap-text: #4a5568;
    --status-confirmed: #d8efe1; --status-confirmed-text: #237a4e;
    --status-pending: #fdebcf; --status-pending-text: #b6730f;
    --status-risk: #fbdcdc; --status-risk-text: #b3322f;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text-dark);
    line-height: 1.55;
  }

  .page {
    max-width: 980px;
    margin: 0 auto;
    padding: 28px 20px 80px;
  }

  /* Hero */
  .hero {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-deep) 100%);
    border-radius: 14px;
    padding: 36px 40px;
    color: #fff;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 24px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .hero-eyebrow {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #9fb4d8;
    margin-bottom: 10px;
  }
  .hero h1 {
    font-size: 32px;
    font-weight: 800;
    line-height: 1.15;
  }
  .hero h1 .accent { color: var(--amber); display: block; }
  .hero-meta {
    text-align: right;
    font-size: 12.5px;
    color: #b9c5da;
    line-height: 1.7;
    min-width: 220px;
  }
  .hero-meta strong { color: #fff; }
  .hero-meta .confidential { color: var(--amber); font-weight: 700; }

  /* TOC */
  .toc {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 22px 28px;
    margin-bottom: 24px;
    box-shadow: 0 1px 2px rgba(20, 30, 50, 0.05);
  }
  .toc-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px 28px;
    list-style: none;
  }
  .toc-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 600;
    color: var(--navy);
    text-decoration: none;
  }
  .toc-item .ico { font-size: 16px; }
  .toc-item:hover,
  .toc-item:focus-visible { color: var(--amber); outline: none; }

  /* Section card */
  .section {
    background: var(--card-bg);
    border-radius: 12px;
    margin-bottom: 16px;
    box-shadow: 0 1px 2px rgba(20, 30, 50, 0.05);
    overflow: hidden;
    scroll-margin-top: 16px;
  }
  .section-toggle {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 26px;
    border: none;
    background: transparent;
    cursor: pointer;
    text-align: left;
    font: inherit;
    color: inherit;
  }
  .section-toggle:hover { background: #f8f9fb; }
  .section-toggle:focus-visible {
    outline: 2px solid var(--amber);
    outline-offset: -2px;
  }
  .section-head-left {
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: 0;
  }
  .section-icon {
    width: 36px;
    height: 36px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }
  .section-toggle h2 {
    font-size: 17px;
    font-weight: 700;
    color: var(--navy);
  }
  .section-head-right {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  .pill {
    font-size: 11.5px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .chev {
    color: var(--text-soft);
    font-size: 13px;
    transition: transform 0.15s;
    display: inline-block;
  }
  .section-toggle[aria-expanded="false"] .chev { transform: rotate(-90deg); }

  .section-body {
    padding: 22px 26px 26px;
    border-top: 1px solid var(--border);
  }
  .section-body[hidden] { display: none; }

  /* Two col grid */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 18px;
  }
  .col-box {
    background: #f8f9fb;
    border-radius: 10px;
    padding: 18px 20px;
  }
  .col-box.challenge { background: #fbf3f0; }
  .col-box.goal { background: #f0f6f0; }
  .col-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.08em;
    color: var(--text-soft);
    margin-bottom: 10px;
  }
  .col-box ul { padding-left: 18px; }
  .col-box li { margin-bottom: 6px; font-size: 14px; color: var(--text-mid); }

  .callout {
    border-radius: 10px;
    padding: 16px 20px;
    font-size: 14px;
    margin-bottom: 12px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .callout .emoji { font-size: 18px; flex-shrink: 0; line-height: 1.4; }
  .callout strong { color: var(--text-dark); }
  .callout.north-star {
    background: var(--amber-light);
    border: 1px solid var(--amber-border);
    color: #6b4a1f;
  }
  .callout.north-star strong { color: #8a5a14; }
  .callout.framing {
    background: var(--blue-light);
    border: 1px solid var(--blue-border);
    color: #2c4566;
  }
  .callout.framing strong { color: #1f3a5f; }

  .section-intro {
    font-size: 13.5px;
    color: var(--text-mid);
    margin: 0 0 14px;
  }

  /* Record type cards */
  .record-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 6px;
  }
  .record-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
  }
  .record-card.core { border-top: 3px solid var(--navy); }
  .record-card.supporting { border-top: 3px solid #c3ccd9; }
  .record-card h3 {
    font-size: 14px;
    margin: 0 0 6px;
    color: var(--navy);
    font-weight: 700;
  }
  .record-card p {
    font-size: 12.5px;
    color: var(--text-soft);
    margin: 0;
  }
  .record-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.05em;
    color: #8b95a5;
    margin-bottom: 6px;
  }

  /* Field table */
  .field-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
    margin-top: 4px;
  }
  .field-table th {
    text-align: left;
    font-size: 11px;
    letter-spacing: 0.05em;
    color: var(--text-soft);
    font-weight: 800;
    padding: 8px 12px;
    border-bottom: 2px solid var(--border);
  }
  .field-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text-mid);
    vertical-align: top;
  }
  .field-table tr:last-child td { border-bottom: none; }
  .field-table td.field-name {
    color: var(--text-dark);
    font-weight: 600;
    white-space: nowrap;
  }
  .tag-inline {
    display: inline-block;
    font-size: 10.5px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    background: #eef1f5;
    color: var(--text-soft);
    margin-left: 6px;
  }
  .tag-inline.risk { background: #fbe6e6; color: #b3322f; }
  .tag-inline.new { background: #e6dcf7; color: #6b3fa0; }

  /* Roadmap */
  .roadmap {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .roadmap-row {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 14px 16px;
    border-radius: 10px;
    background: #f8f9fb;
  }
  .roadmap-phase {
    font-size: 12px;
    font-weight: 800;
    padding: 4px 10px;
    border-radius: 8px;
    white-space: nowrap;
    min-width: 84px;
    text-align: center;
  }
  .roadmap-row.p1 .roadmap-phase { background: var(--pill-phase1); color: var(--pill-phase1-text); }
  .roadmap-row.p2 .roadmap-phase { background: var(--pill-phase2); color: var(--pill-phase2-text); }
  .roadmap-row.p3 .roadmap-phase { background: var(--pill-phase3); color: var(--pill-phase3-text); }
  .roadmap-text { font-size: 13.5px; color: var(--text-mid); }
  .roadmap-text strong { color: var(--text-dark); }

  /* Open questions */
  .q-list { list-style: none; }
  .q-item {
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .q-item:last-child { border-bottom: none; }
  .q-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .q-num {
    font-size: 12px;
    font-weight: 800;
    color: #fff;
    background: var(--navy);
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .q-title { font-size: 14.5px; font-weight: 700; color: var(--text-dark); }
  .q-status {
    margin-left: auto;
    font-size: 10.5px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 10px;
    white-space: nowrap;
  }
  .q-status.pending { background: var(--status-pending); color: var(--status-pending-text); }
  .q-status.confirmed { background: var(--status-confirmed); color: var(--status-confirmed-text); }
  .q-status.risk { background: var(--status-risk); color: var(--status-risk-text); }
  .q-body { font-size: 13.5px; color: var(--text-mid); padding-left: 32px; }

  /* Action items */
  .action-list { list-style: none; }
  .action-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .action-item:last-child { border-bottom: none; }
  .action-check {
    width: 20px;
    height: 20px;
    border-radius: 5px;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 800;
  }
  .action-check.done { background: #d8efe1; color: #237a4e; }
  .action-check.open { background: #fdebcf; color: #b6730f; border: 1.5px solid #f0c896; }
  .action-text { font-size: 14px; color: var(--text-mid); }
  .action-text strong { color: var(--text-dark); }
  .action-owner { font-size: 11.5px; color: var(--text-soft); margin-top: 2px; }

  .footer-note {
    text-align: center;
    font-size: 12px;
    color: var(--text-soft);
    margin-top: 24px;
  }

  @media (max-width: 760px) {
    .toc-grid { grid-template-columns: repeat(2, 1fr); }
    .hero { padding: 28px 24px; }
    .hero-meta { text-align: left; min-width: 0; }
    .record-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 700px) {
    .two-col { grid-template-columns: 1fr; }
    .section-toggle h2 { font-size: 15px; }
  }
</style>
</head>
<body>
<div class="page">
  <header class="hero" id="hero"></header>
  <nav class="toc" aria-label="Table of contents">
    <ul class="toc-grid" id="toc"></ul>
  </nav>
  <main id="sections"></main>
  <p class="footer-note" id="footer-note"></p>
</div>

<script>
  const PILL_STYLES = {
    foundation: 'background:var(--pill-foundation);color:var(--pill-foundation-text)',
    schema: 'background:var(--pill-schema);color:var(--pill-schema-text)',
    discovery: 'background:var(--pill-discovery);color:var(--pill-discovery-text)',
    phase1: 'background:var(--pill-phase1);color:var(--pill-phase1-text)',
    phase1kpi: 'background:var(--pill-phase1kpi);color:var(--pill-phase1kpi-text)',
    phase2: 'background:var(--pill-phase2);color:var(--pill-phase2-text)',
    phase3: 'background:var(--pill-phase3);color:var(--pill-phase3-text)',
    roadmap: 'background:var(--pill-roadmap);color:var(--pill-roadmap-text)',
  };

  const PAGE_META = {
    eyebrow: 'MACKINAC CENTER · PIPELINE.APP',
    title: 'Bill Tracker',
    accent: 'Strategic Build Plan',
    metaLines: [
      'Based on Cami Pendell Requirements Doc',
      '& May 5 Kickoff Call',
    ],
    preparedBy: 'Brian McLaughlin',
    footer: 'Mackinac Bill Tracker · Strategic Build Plan · Pipeline.app · Confidential',
  };

  const TOC_ITEMS = [
    { id: 'overview', icon: '🎯', label: 'Overview & North Star' },
    { id: 'data-arch', icon: '🗂️', label: 'Data Architecture' },
    { id: 'roles', icon: '🔐', label: 'User Roles & Permissions' },
    { id: 'bill-record', icon: '📄', label: 'Bill Record' },
    { id: 'position', icon: '🏛️', label: 'MCPP Position & Priority' },
    { id: 'cross-cycle', icon: '🔗', label: 'Cross-Cycle Linking' },
    { id: 'director', icon: '👤', label: 'Director Assignment' },
    { id: 'ai', icon: '✨', label: 'AI Enhancements' },
    { id: 'roadmap', icon: '🗺️', label: 'Phased Build Plan' },
    { id: 'questions', icon: '❓', label: 'Open Questions' },
    { id: 'actions', icon: '✅', label: 'Action Items' },
  ];

  const RECORD_TYPES = [
    { kind: 'core', tag: 'CORE', title: 'Bill Record', description: 'Number, title, sponsor, status, full text, history. One record per bill per legislative cycle.' },
    { kind: 'core', tag: 'CORE', title: 'MCPP Position Record', description: 'Support/Oppose/Watching/Unimportant, priority, published/unpublished flag, notes, director.' },
    { kind: 'core', tag: 'CORE', title: 'Cross-Cycle Link', description: 'Connects a bill to its prior-session incarnation(s). The actual differentiator from Quorum.' },
    { kind: 'supporting', tag: 'SUPPORTING', title: 'Document & Testimony', description: 'Uploaded files, committee testimony checkboxes, printable activity report.' },
    { kind: 'supporting', tag: 'SUPPORTING', title: 'Category Tag', description: "MCPP topic taxonomy for cross-search. Pending Cami's category list." },
    { kind: 'supporting', tag: 'SUPPORTING', title: 'Staff & Roles', description: 'Policy director directory, GA staff, edit vs. read-only permissions.' },
  ];

  const BILL_RECORD_FIELDS = [
    { field: 'Legislative Cycle', description: 'Two-year designation, e.g. 2025–2026.' },
    { field: 'Bill/Resolution Number', description: 'HB, SB, HR, SR, HCR, SCR, HJR, SJR.' },
    { field: 'Title', description: 'One- to two-line description.' },
    { field: 'Sponsor & Co-sponsors', description: 'A working scraper exists for this', tag: { label: 'verify', variant: 'default' }, descriptionSuffix: ' but is disconnected from any database today.' },
    { field: 'Status & History', description: 'Current stage plus completed stage history.' },
    { field: 'Full Text', description: 'Complete bill/resolution content.' },
    { field: 'Documents', description: 'Any file type, including images, attached to the bill.' },
  ];

  const POSITION_FIELDS = [
    { field: 'Position', description: 'Support / Oppose / Watching / Unimportant.' },
    { field: 'Published Flag', description: 'Public or internal-only. MCPP often holds a position it deliberately does not publish.', tag: { label: 'new — Gap 7', variant: 'new' } },
    { field: 'Priority', description: 'High (testify in person), Medium (turn in a card), Low (no action).' },
    { field: 'Director Assignment', description: 'Auto email notification to assigned policy director.' },
    { field: 'MCPP Notes', description: 'Shared field for GA staff and the lead policy director.' },
  ];

  const CROSS_CYCLE_STATUS = [
    { field: 'Confirmed verbally', description: 'Cami described this in detail on the May 5 kickoff call. Written confirmation is mostly a formality at this point.' },
    { field: 'Codebase check', description: 'Confirmed via audit (June 17): does not exist in any form today, not even partially, in either the frontend or backend repo.' },
    { field: 'Historical data risk', description: 'MIRS export may not be recoverable. Cami was unsure whether batch export is possible or how often MIRS wipes historical data.', tag: { label: 'at risk', variant: 'risk' } },
  ];

  const AI_FEATURES = [
    { field: 'AI Summary', description: 'Plain-language explanation of a bill beyond its title.' },
    { field: 'Retroactive Position Drafting', description: 'For bills MCPP took a position on but never published, AI drafts a suggested position from past blog content and committee records, routed to an approval inbox.', tag: { label: 'new — from kickoff call', variant: 'new' } },
    { field: 'Mackinac Materials Linking', description: 'Automated linking to MCPP blogs, articles, op-eds, and testimony.' },
    { field: 'Committee Minutes Scraping', description: 'Recovers undocumented historical positions across cycles from meeting records.' },
    { field: 'Visual Bill Progress', description: 'Graphic showing movement through the legislative process.' },
    { field: 'Executive Orders Module', description: 'EO links with notification on new orders; shareable with directors and legal.' },
  ];

  const ROADMAP_PHASES = [
    { phase: 'PHASE 1', variant: 'p1', label: 'Core platform:', text: 'bill record, MCPP position and priority, cross-cycle linking, director assignment, search, document upload, testimony tracking. Built largely from scratch; the existing Feed UI is reusable but the data layer is not.' },
    { phase: 'PHASE 2', variant: 'p2', label: 'AI enhancements:', text: 'retroactive position drafting, AI summaries, Mackinac materials linking, committee minutes scraping, visual progress, executive orders module.' },
    { phase: 'PHASE 3', variant: 'p3', label: 'Reporting & scale:', text: 'printable activity reports, cross-search by category once taxonomy is finalized, expanded stakeholder tracking.' },
  ];

  const OPEN_QUESTIONS = [
    { title: 'Cross-cycle bill linking', status: 'Pre-confirmed', statusVariant: 'confirmed', description: 'Confirmed in detail by Cami on the May 5 call. Written confirmation pending from the June 17 email, mostly a formality.' },
    { title: 'MCPP Category list', status: 'Awaiting Cami', statusVariant: 'pending', description: 'Example list referenced but never included in the requirements doc. Required for database design.' },
    { title: 'Auto-population vs. manual entry', status: 'Partially resolved', statusVariant: 'pending', description: 'A working scraper exists for legislature.mi.gov but is disconnected from the app. Decision is whether to fund the ingestion pipeline.' },
    { title: 'User roles and permissions', status: 'Awaiting Cami', statusVariant: 'pending', description: 'Edit vs. read-only access undefined. GA staff only, or policy directors too?' },
    { title: 'MichiganVotes reference', status: 'Awaiting Cami', statusVariant: 'pending', description: 'Appears once in the staff progress statuses with no context. Unclear if external integration is required.' },
    { title: 'MIRS historical export', status: 'At risk', statusVariant: 'risk', description: 'Cami was unsure if batch export is possible or how often MIRS wipes data. May not be recoverable, not just delayed.' },
    { title: 'Published vs. unpublished position', status: 'Not yet raised', statusVariant: 'pending', description: 'Surfaced on the kickoff call, missing from the written doc. Needs a public/private flag separate from the position itself.' },
  ];

  const ACTION_ITEMS = [
    { status: 'done', text: 'Send clarification email to Cami covering Gaps 1–6', owner: 'Brian · Sent June 17' },
    { status: 'open', text: 'Send follow-up email to Cami covering Gap 7 (published/unpublished positions)', owner: 'Brian · Drafted, confirm sent' },
    { status: 'open', text: 'Decide whether to greenlight the Supabase ingestion pipeline around the existing scraper, independent of Cami\'s other answers', owner: 'Michael & Dan · Discuss at June 18 review' },
    { status: 'open', text: 'Decide on a fallback plan for cross-cycle linking if MIRS historical data is confirmed unrecoverable', owner: 'Michael & Dan · Discuss at June 18 review' },
    { status: 'open', text: 'Create Linear epic and break Phase 1 into tickets once scope is locked; update or retire stale PIP-216', owner: 'Brian · After June 18 review' },
    { status: 'open', text: 'Assign technical owner for Supabase schema design', owner: 'Dan · Pending Phase 1 lock' },
  ];

  const SECTIONS = [
    {
      id: 'overview',
      icon: '🎯',
      iconBg: '#eef4fb',
      title: 'Overview & North Star',
      pill: 'Foundation',
      pillStyle: 'foundation',
      defaultOpen: true,
      bodyType: 'overview',
      body: {
        challenge: [
          'Michigan bill numbers reset every two years, breaking continuity',
          'GA staff manually re-search history every new session',
          'Quorum has no concept of cross-cycle bill identity',
          'Unpublished internal positions live in email and memory only',
          'MIRS historical data may not be recoverable at all',
        ],
        goal: [
          'Purpose-built tracker, scoped to Michigan, not 50 states',
          'Automatic linking of a bill to its prior-cycle incarnations',
          'One field for position, priority, and director assignment',
          "AI-assisted recall of MCPP's past stance on a reintroduced bill",
          "Replace Quorum's bill tracking with something built for this team",
        ],
        callouts: [
          { variant: 'north-star', emoji: '🎯', label: 'North Star:', text: '"Senate Bill 1 from 2025–26 should never make us relearn what we already decided in 2023–24." Every schema decision, every field, every notification should be evaluated against whether it gets Mackinac closer to a reintroduced bill automatically surfacing its own history.' },
          { variant: 'framing', emoji: '💡', label: "Cami's framing:", text: "the time sink isn't tracking a bill in a single session, it's rediscovering a position MCPP already took two or four years ago under a different bill number. Government Affairs and policy directors both lose hours to this every cycle. Solve that one problem well and the rest of the tracker is table stakes by comparison." },
        ],
      },
    },
    {
      id: 'data-arch',
      icon: '🗂️',
      iconBg: '#eef4fb',
      title: 'Data Architecture — Three Core + Three Supporting Record Types',
      pill: 'Schema',
      pillStyle: 'schema',
      bodyType: 'recordGrid',
      body: {
        intro: 'Three record types carry the weight of the system. Three more support them but could be added incrementally without reworking the core.',
        records: RECORD_TYPES,
      },
    },
    {
      id: 'roles',
      icon: '🔐',
      iconBg: '#fbeceb',
      title: 'User Roles & Permissions',
      pill: 'Needs Discovery',
      pillStyle: 'discovery',
      bodyType: 'prose',
      body: {
        paragraphs: [
          'Edit versus read-only access is undefined. Open question: is this limited to Government Affairs staff, or do policy directors also need edit rights? This decision drives the assignment and notification architecture and needs to be resolved before that work can start. See Gap 4 below.',
        ],
      },
    },
    {
      id: 'bill-record',
      icon: '📄',
      iconBg: '#f1ecfa',
      title: 'Bill Record — Full Field Specification',
      pill: 'Phase 1',
      pillStyle: 'phase1',
      bodyType: 'fieldTable',
      body: { columns: ['Field', 'Description'], rows: BILL_RECORD_FIELDS },
    },
    {
      id: 'position',
      icon: '🏛️',
      iconBg: '#fcf2e3',
      title: 'MCPP Position & Priority',
      pill: 'Phase 1 — Core KPI',
      pillStyle: 'phase1kpi',
      bodyType: 'fieldTable',
      body: { columns: ['Field', 'Description'], rows: POSITION_FIELDS },
    },
    {
      id: 'cross-cycle',
      icon: '🔗',
      iconBg: '#e9f4ee',
      title: 'Cross-Cycle Linking',
      pill: 'Phase 1 — Differentiator',
      pillStyle: 'phase1kpi',
      bodyType: 'crossCycle',
      body: {
        intro: 'The reason this build exists. A reintroduced bill (e.g. House Bill 4001 may have been House Bill 5300 last cycle and House Bill 4265 the cycle before that) should automatically surface its prior history and prompt a reconfirm or update of MCPP\'s position.',
        columns: ['Status', 'Detail'],
        rows: CROSS_CYCLE_STATUS,
      },
    },
    {
      id: 'director',
      icon: '👤',
      iconBg: '#eef4fb',
      title: 'Director Assignment & Notifications',
      pill: 'Phase 1',
      pillStyle: 'phase1',
      bodyType: 'prose',
      body: {
        paragraphs: [
          'Designate a policy director as lead on a bill, with automatic email notification on assignment. Government Affairs also receives notifications when a tracked bill (High, Low, or Watching) has a status change. Depends on resolving roles and permissions first.',
        ],
      },
    },
    {
      id: 'ai',
      icon: '✨',
      iconBg: '#f1ecfa',
      title: 'AI Enhancements',
      pill: 'Phase 2',
      pillStyle: 'phase2',
      bodyType: 'fieldTable',
      body: { columns: ['Feature', 'Description'], rows: AI_FEATURES },
    },
    {
      id: 'roadmap',
      icon: '🗺️',
      iconBg: '#eef4fb',
      title: 'Phased Build Plan',
      pill: 'Roadmap',
      pillStyle: 'roadmap',
      bodyType: 'roadmap',
      body: { phases: ROADMAP_PHASES },
    },
    {
      id: 'questions',
      icon: '❓',
      iconBg: '#fbeceb',
      title: 'Open Questions',
      pill: '7 Gaps',
      pillStyle: 'discovery',
      bodyType: 'questions',
      body: { items: OPEN_QUESTIONS },
    },
    {
      id: 'actions',
      icon: '✅',
      iconBg: '#e9f4ee',
      title: 'Action Items',
      bodyType: 'actions',
      body: { items: ACTION_ITEMS },
    },
  ];

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderTag(tag) {
    if (!tag) return '';
    const variant = tag.variant === 'risk' ? ' risk' : tag.variant === 'new' ? ' new' : '';
    return `<span class="tag-inline${variant}">${escapeHtml(tag.label)}</span>`;
  }

  function renderFieldRow(row) {
    const desc = escapeHtml(row.description) +
      (row.tag ? ` ${renderTag(row.tag)}` : '') +
      (row.descriptionSuffix ? escapeHtml(row.descriptionSuffix) : '');
    return `<tr><td class="field-name">${escapeHtml(row.field)}</td><td>${desc}</td></tr>`;
  }

  function renderFieldTable(columns, rows) {
    const header = columns.map(col => `<th scope="col">${escapeHtml(col)}</th>`).join('');
    const body = rows.map(renderFieldRow).join('');
    return `<table class="field-table"><thead><tr>${header}</tr></thead><tbody>${body}</tbody></table>`;
  }

  function renderOverview(body) {
    const challenge = body.challenge.map(item => `<li>${escapeHtml(item)}</li>`).join('');
    const goal = body.goal.map(item => `<li>${escapeHtml(item)}</li>`).join('');
    const callouts = body.callouts.map(callout => `
      <div class="callout ${callout.variant}">
        <span class="emoji" aria-hidden="true">${callout.emoji}</span>
        <div><strong>${escapeHtml(callout.label)}</strong> ${escapeHtml(callout.text)}</div>
      </div>
    `).join('');
    return `
      <div class="two-col">
        <div class="col-box challenge">
          <div class="col-label">THE CHALLENGE</div>
          <ul>${challenge}</ul>
        </div>
        <div class="col-box goal">
          <div class="col-label">THE GOAL</div>
          <ul>${goal}</ul>
        </div>
      </div>
      ${callouts}
    `;
  }

  function renderRecordGrid(body) {
    const cards = body.records.map(record => `
      <article class="record-card ${record.kind}">
        <span class="record-tag">${escapeHtml(record.tag)}</span>
        <h3>${escapeHtml(record.title)}</h3>
        <p>${escapeHtml(record.description)}</p>
      </article>
    `).join('');
    return `<p class="section-intro">${escapeHtml(body.intro)}</p><div class="record-grid">${cards}</div>`;
  }

  function renderProse(body) {
    return body.paragraphs.map(p => `<p class="section-intro">${escapeHtml(p)}</p>`).join('');
  }

  function renderCrossCycle(body) {
    return `<p class="section-intro">${escapeHtml(body.intro)}</p>${renderFieldTable(body.columns, body.rows)}`;
  }

  function renderRoadmap(body) {
    const rows = body.phases.map(phase => `
      <div class="roadmap-row ${phase.variant}">
        <div class="roadmap-phase">${escapeHtml(phase.phase)}</div>
        <div class="roadmap-text"><strong>${escapeHtml(phase.label)}</strong> ${escapeHtml(phase.text)}</div>
      </div>
    `).join('');
    return `<div class="roadmap">${rows}</div>`;
  }

  function renderQuestions(body) {
    const items = body.items.map((item, index) => `
      <li class="q-item">
        <div class="q-head">
          <span class="q-num" aria-hidden="true">${index + 1}</span>
          <span class="q-title">${escapeHtml(item.title)}</span>
          <span class="q-status ${item.statusVariant}">${escapeHtml(item.status)}</span>
        </div>
        <p class="q-body">${escapeHtml(item.description)}</p>
      </li>
    `).join('');
    return `<ol class="q-list">${items}</ol>`;
  }

  function renderActions(body) {
    const items = body.items.map(item => {
      const icon = item.status === 'done' ? '✓' : '!';
      const checkClass = item.status === 'done' ? 'done' : 'open';
      return `
        <li class="action-item">
          <span class="action-check ${checkClass}" aria-hidden="true">${icon}</span>
          <div>
            <div class="action-text">${escapeHtml(item.text)}</div>
            <div class="action-owner">${escapeHtml(item.owner)}</div>
          </div>
        </li>
      `;
    }).join('');
    return `<ul class="action-list">${items}</ul>`;
  }

  function renderSectionBody(section) {
    switch (section.bodyType) {
      case 'overview': return renderOverview(section.body);
      case 'recordGrid': return renderRecordGrid(section.body);
      case 'prose': return renderProse(section.body);
      case 'fieldTable': return renderFieldTable(section.body.columns, section.body.rows);
      case 'crossCycle': return renderCrossCycle(section.body);
      case 'roadmap': return renderRoadmap(section.body);
      case 'questions': return renderQuestions(section.body);
      case 'actions': return renderActions(section.body);
      default: return '';
    }
  }

  function renderHero() {
    const metaLines = PAGE_META.metaLines.map(line => `${line}<br>`).join('');
    document.getElementById('hero').innerHTML = `
      <div>
        <p class="hero-eyebrow">${escapeHtml(PAGE_META.eyebrow)}</p>
        <h1>${escapeHtml(PAGE_META.title)}<span class="accent">${escapeHtml(PAGE_META.accent)}</span></h1>
      </div>
      <div class="hero-meta">
        ${metaLines}
        <strong>Prepared by ${escapeHtml(PAGE_META.preparedBy)}</strong><br>
        <span class="confidential">Confidential</span>
      </div>
    `;
  }

  function renderToc() {
    document.getElementById('toc').innerHTML = TOC_ITEMS.map(item => `
      <li>
        <a class="toc-item" href="#${item.id}">
          <span class="ico" aria-hidden="true">${item.icon}</span>
          ${escapeHtml(item.label)}
        </a>
      </li>
    `).join('');
  }

  function renderSections() {
    const container = document.getElementById('sections');
    container.innerHTML = SECTIONS.map(section => {
      const pillHtml = section.pill
        ? `<span class="pill" style="${PILL_STYLES[section.pillStyle]}">${escapeHtml(section.pill)}</span>`
        : '';
      const expanded = section.defaultOpen ? 'true' : 'false';
      const hidden = section.defaultOpen ? '' : ' hidden';
      return `
        <section class="section" id="${section.id}">
          <button
            type="button"
            class="section-toggle"
            id="toggle-${section.id}"
            aria-expanded="${expanded}"
            aria-controls="body-${section.id}"
          >
            <span class="section-head-left">
              <span class="section-icon" style="background:${section.iconBg};" aria-hidden="true">${section.icon}</span>
              <h2>${escapeHtml(section.title)}</h2>
            </span>
            <span class="section-head-right">
              ${pillHtml}
              <span class="chev" aria-hidden="true">▾</span>
            </span>
          </button>
          <div class="section-body" id="body-${section.id}" role="region"${hidden}>
            ${renderSectionBody(section)}
          </div>
        </section>
      `;
    }).join('');

    container.querySelectorAll('.section-toggle').forEach(button => {
      button.addEventListener('click', () => toggleSection(button));
    });
  }

  function toggleSection(button) {
    const expanded = button.getAttribute('aria-expanded') === 'true';
    const body = document.getElementById(button.getAttribute('aria-controls'));
    button.setAttribute('aria-expanded', expanded ? 'false' : 'true');
    body.hidden = expanded;
  }

  function openSection(id) {
    const button = document.getElementById(`toggle-${id}`);
    const body = document.getElementById(`body-${id}`);
    if (button && body) {
      button.setAttribute('aria-expanded', 'true');
      body.hidden = false;
    }
    const section = document.getElementById(id);
    if (section) {
      section.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }

  function initTocNavigation() {
    document.querySelectorAll('.toc-item').forEach(link => {
      link.addEventListener('click', event => {
        event.preventDefault();
        const id = link.getAttribute('href').slice(1);
        openSection(id);
        history.replaceState(null, '', `#${id}`);
      });
    });

    if (location.hash) {
      const id = location.hash.slice(1);
      if (document.getElementById(id)) {
        openSection(id);
      }
    }
  }

  function init() {
    renderHero();
    renderToc();
    renderSections();
    document.getElementById('footer-note').textContent = PAGE_META.footer;
    initTocNavigation();
  }

  init();
</script>
</body>
