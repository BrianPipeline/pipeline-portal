<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mackinac Bill Tracker — Strategic Build Plan</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:       #1A3A5C;
    --blue:       #2E6DA4;
    --blue-lt:    #D6E8F7;
    --blue-mid:   #4A8EC2;
    --gold:       #C8860A;
    --gold-bg:    #FFF8EC;
    --gold-lt:    #FFE9B5;
    --green:      #1E7145;
    --green-bg:   #EAF4EE;
    --green-lt:   #B8DFC8;
    --purple:     #5B3FA0;
    --purple-bg:  #F0ECFA;
    --red:        #C0392B;
    --red-bg:     #FDF0EF;
    --gray-bg:    #F4F7FB;
    --gray-lt:    #FAFBFD;
    --gray-mid:   #666;
    --gray-text:  #333;
    --border:     #E0E6EF;
    --white:      #fff;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #EEF2F8;
    color: var(--gray-text);
    line-height: 1.6;
    padding: 2rem 1rem 4rem;
  }

  .page { max-width: 960px; margin: 0 auto; }

  /* Header */
  .doc-header {
    background: var(--navy);
    border-radius: 14px;
    padding: 2rem 2.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 1rem;
  }
  .doc-header .eyebrow {
    font-size: 11px; font-weight: 700;
    letter-spacing: .14em; text-transform: uppercase;
    color: var(--blue-mid); margin-bottom: 6px;
  }
  .doc-header h1 {
    font-size: 30px; font-weight: 800;
    color: #fff; line-height: 1.15;
  }
  .doc-header h1 span { color: var(--gold); display: block; }
  .doc-header .meta {
    text-align: right; font-size: 12px;
    color: #8BA8C4; line-height: 1.8; flex-shrink: 0;
  }
  .doc-header .meta .confidential { color: var(--gold); font-weight: 700; }

  /* TOC */
  .toc {
    background: var(--white); border-radius: 12px;
    border: 1px solid var(--border);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.25rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 6px;
    list-style: none;
  }
  .toc-item {
    font-size: 13px; color: var(--blue);
    padding: 6px 10px; border-radius: 6px;
    cursor: pointer; transition: background .12s;
    display: flex; align-items: center; gap: 6px;
    text-decoration: none;
  }
  .toc-item:hover,
  .toc-item:focus-visible { background: var(--blue-lt); outline: none; }
  .toc-item .toc-icon { font-size: 14px; }

  /* Sections */
  .section {
    background: var(--white);
    border-radius: 12px;
    border: 1px solid var(--border);
    margin-bottom: 1.25rem;
    overflow: hidden;
    scroll-margin-top: 16px;
  }
  .section-toggle {
    width: 100%;
    padding: 1rem 1.5rem;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer;
    border: none;
    background: transparent;
    text-align: left;
    font: inherit;
    color: inherit;
    transition: background .15s;
  }
  .section-toggle:hover { background: var(--gray-bg); }
  .section-toggle[aria-expanded="true"] { border-bottom: 1px solid var(--border); }
  .section-toggle:focus-visible {
    outline: 2px solid var(--blue-mid);
    outline-offset: -2px;
  }
  .section-icon {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .section-toggle h2 {
    font-size: 16px; font-weight: 700; color: var(--navy); flex: 1;
  }
  .section-toggle .badge {
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    border-radius: 20px; flex-shrink: 0;
  }
  .section-toggle .chevron {
    font-size: 12px; color: var(--gray-mid);
    transition: transform .2s; flex-shrink: 0;
  }
  .section-toggle[aria-expanded="true"] .chevron { transform: rotate(180deg); }
  .section-body { padding: 1.5rem; }
  .section-body[hidden] { display: none; }

  /* Phase banners (roadmap) */
  .phase-banner {
    border-radius: 10px; padding: 1rem 1.25rem;
    display: flex; gap: 14px; align-items: flex-start;
    margin-bottom: 1.25rem;
  }
  .phase-banner:last-child { margin-bottom: 0; }
  .phase-num {
    font-size: 28px; font-weight: 800; line-height: 1;
    flex-shrink: 0; margin-top: 2px;
  }
  .phase-banner h3 { font-size: 15px; font-weight: 700; margin-bottom: 3px; color: var(--navy); }
  .phase-banner p  { font-size: 13px; line-height: 1.6; color: var(--gray-mid); }
  .phase-1 { background: var(--blue-lt); }
  .phase-1 .phase-num { color: var(--blue); }
  .phase-2 { background: var(--gold-bg); }
  .phase-2 .phase-num { color: var(--gold); }
  .phase-3 { background: var(--green-bg); }
  .phase-3 .phase-num { color: var(--green); }

  /* Tables */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    background: var(--navy); color: #fff;
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .08em;
    padding: 9px 12px; text-align: left;
  }
  td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: top; color: var(--gray-mid); }
  tr:last-child td { border-bottom: none; }
  tr:nth-child(even) td { background: var(--gray-lt); }
  td.field-name { color: var(--navy); font-weight: 600; white-space: nowrap; }
  .tag-inline {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 4px; margin-left: 6px;
  }
  .tag-inline.risk { background: var(--red-bg); color: var(--red); }
  .tag-inline.new { background: var(--purple-bg); color: var(--purple); }
  .tag-inline.default { background: var(--gray-bg); color: var(--gray-mid); }

  /* Record cards */
  .record-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 8px;
    margin-bottom: 6px;
  }
  .record-card {
    border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; background: var(--white);
  }
  .record-card.core { border-top: 3px solid var(--navy); }
  .record-card.supporting { border-top: 3px solid #c3ccd9; }
  .record-tag {
    display: inline-block; font-size: 10px; font-weight: 700;
    letter-spacing: .05em; color: var(--gray-mid); margin-bottom: 6px;
  }
  .record-card h3 {
    font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 4px;
  }
  .record-card p { font-size: 11.5px; color: var(--gray-mid); line-height: 1.5; }

  /* Callouts */
  .callout {
    border-radius: 8px; padding: .9rem 1.1rem;
    display: flex; gap: 12px; margin-bottom: 1rem;
    align-items: flex-start;
  }
  .callout:last-child { margin-bottom: 0; }
  .callout-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .callout p { font-size: 13px; line-height: 1.65; }
  .callout strong { font-weight: 700; }
  .callout-gold { background: var(--gold-bg); border-left: 3px solid var(--gold); }
  .callout-blue  { background: var(--blue-lt); border-left: 3px solid var(--blue); }

  /* Two-col */
  .two-col {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-bottom: 1rem;
  }
  .info-card {
    background: var(--gray-bg); border-radius: 8px;
    padding: 1rem 1.1rem;
  }
  .info-card h4 {
    font-size: 12px; font-weight: 700; color: var(--navy);
    text-transform: uppercase; letter-spacing: .08em;
    margin-bottom: 8px;
  }
  .info-card ul { padding-left: 1rem; }
  .info-card li { font-size: 13px; line-height: 1.7; color: var(--gray-text); }

  .section-intro {
    font-size: 13px; color: var(--gray-mid);
    margin: 0 0 1rem; line-height: 1.6;
  }

  /* Open questions */
  .question-list { display: grid; gap: 8px; }
  .q-item {
    display: flex; gap: 0;
    border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
    cursor: pointer; user-select: none;
    transition: opacity .2s, border-color .15s;
  }
  .q-item:hover { border-color: var(--blue-mid); }
  .q-item.checked { opacity: 0.5; }
  .q-item.checked .q-title,
  .q-item.checked .q-desc { text-decoration: line-through; }
  .q-num {
    background: var(--blue); color: #fff;
    font-weight: 700; font-size: 13px;
    padding: 12px 14px; display: flex;
    align-items: center; justify-content: center;
    min-width: 42px; flex-shrink: 0;
    transition: background .15s;
  }
  .q-num .q-check { display: none; }
  .q-item.checked .q-num { background: var(--green); }
  .q-item.checked .q-num .q-num-label { display: none; }
  .q-item.checked .q-num .q-check { display: flex; }
  .q-body { padding: 11px 14px; flex: 1; min-width: 0; }
  .q-head-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 3px; flex-wrap: wrap;
  }
  .q-title {
    font-size: 13.5px; font-weight: 700; color: var(--navy); flex: 1;
  }
  .q-status {
    font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 10px;
    white-space: nowrap; flex-shrink: 0;
  }
  .q-status.pending { background: var(--gold-bg); color: var(--gold); }
  .q-status.confirmed { background: var(--green-bg); color: var(--green); }
  .q-status.risk { background: var(--red-bg); color: var(--red); }
  .q-desc { font-size: 12.5px; color: var(--gray-mid); line-height: 1.6; }
  .q-resolution {
    margin-top: 10px;
    user-select: text;
    cursor: auto;
  }
  .q-resolution-label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--gray-mid);
    margin-bottom: 6px;
  }
  .q-resolution-input {
    width: 100%;
    font-family: inherit;
    font-size: 13px;
    line-height: 1.5;
    color: var(--gray-text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    background: var(--white);
    resize: vertical;
    min-height: 52px;
  }
  .q-resolution-input:focus {
    outline: none;
    border-color: var(--blue-mid);
  }
  .q-resolution-input::placeholder { color: #999; }

  /* Action items */
  .action-list-header {
    display: flex; justify-content: flex-end;
    margin-bottom: 10px;
  }
  .action-reset {
    font-size: 12px; color: var(--blue);
    cursor: pointer; text-decoration: none;
    border: none; background: none; padding: 0;
    font-family: inherit;
  }
  .action-reset:hover { text-decoration: underline; }

  .action-list { display: grid; gap: 8px; }
  .action-item {
    display: flex; gap: 10px; align-items: flex-start;
    background: var(--gray-bg); border-radius: 8px;
    padding: 10px 14px;
    cursor: pointer; user-select: none;
    transition: opacity .2s;
  }
  .action-item:hover { background: #E8EDF5; }
  .action-item.checked { opacity: 0.5; }
  .action-item.checked .action-text { text-decoration: line-through; }
  .action-check {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--white);
    flex-shrink: 0; margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    color: transparent;
    transition: background .15s, border-color .15s, color .15s;
  }
  .action-item.checked .action-check {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
  }
  .action-content { flex: 1; min-width: 0; }
  .action-text { font-size: 13px; line-height: 1.6; color: var(--gray-text); }
  .action-text strong { color: var(--navy); }
  .action-meta {
    font-size: 11px; color: var(--gray-mid); margin-top: 2px;
  }
  .action-owner {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .08em; padding: 3px 8px; border-radius: 4px;
    flex-shrink: 0; margin-top: 1px;
  }
  .action-mak  { background: var(--gold-bg); color: var(--gold); }
  .action-pipe { background: var(--green-bg); color: var(--green); }
  .action-both { background: var(--blue-lt); color: var(--blue); }

  .footer-note {
    text-align: center;
    font-size: 12px;
    color: var(--gray-mid);
    margin-top: 1.5rem;
  }

  @media (max-width: 600px) {
    .doc-header { flex-direction: column; align-items: flex-start; }
    .doc-header .meta { text-align: left; }
    .two-col { grid-template-columns: 1fr; }
    .record-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

<div class="page">

  <main id="sections"></main>
  <p class="footer-note" id="footer-note"></p>
</div>

  const SECTIONS = [

    {
      id: 'roadmap',
      icon: '🗺️',
      iconBg: 'var(--gray-bg)',
      title: 'Phased Build Plan',
      pill: 'Roadmap',
      pillStyle: 'roadmap',
      bodyType: 'roadmap',
      body: { phases: ROADMAP_PHASES },
    },
    {
      id: 'data-arch',
      icon: '🗂️',
      iconBg: 'var(--blue-lt)',
      title: 'Data Architecture — Three Core + Three Supporting Record Types',
      pill: 'Schema',
      pillStyle: 'schema',
      bodyType: 'recordGrid',
      body: {
        intro: 'Three record types carry the weight of the system. Three more support them but could be added incrementally without reworking the core.',
        records: RECORD_TYPES,
      },
    },
    {
      id: 'roles',
      icon: '🔐',
      iconBg: 'var(--red-bg)',
      title: 'User Roles & Permissions',
      pill: 'Needs Discovery',
      pillStyle: 'discovery',
      bodyType: 'prose',
      body: {
        paragraphs: [
          'Edit versus read-only access is undefined. Open question: is this limited to Government Affairs staff, or do policy directors also need edit rights? This decision drives the assignment and notification architecture and needs to be resolved before that work can start. See Gap 4 below.',
        ],
      },
    },
    {
      id: 'bill-record',
      icon: '📄',
      iconBg: 'var(--purple-bg)',
      title: 'Bill Record — Full Field Specification',
      pill: 'Phase 1',
      pillStyle: 'phase1',
      bodyType: 'fieldTable',
      body: { columns: ['Field', 'Description'], rows: BILL_RECORD_FIELDS },
    },
    {
      id: 'position',
      icon: '🏛️',
      iconBg: 'var(--gold-bg)',
      title: 'MCPP Position & Priority',
      pill: 'Phase 1 — Core KPI',
      pillStyle: 'phase1kpi',
      bodyType: 'fieldTable',
      body: { columns: ['Field', 'Description'], rows: POSITION_FIELDS },
    },
    {
      id: 'cross-cycle',
      icon: '🔗',
      iconBg: 'var(--green-bg)',
      title: 'Cross-Cycle Linking',
      pill: 'Phase 1 — Differentiator',
      pillStyle: 'phase1kpi',
      bodyType: 'crossCycle',
      body: {
        intro: 'The reason this build exists. A reintroduced bill (e.g. House Bill 4001 may have been House Bill 5300 last cycle and House Bill 4265 the cycle before that) should automatically surface its prior history and prompt a reconfirm or update of MCPP\'s position.',
        columns: ['Status', 'Detail'],
        rows: CROSS_CYCLE_STATUS,
      },
    },
    {
      id: 'director',
      icon: '👤',
      iconBg: 'var(--blue-lt)',
      title: 'Director Assignment & Notifications',
      pill: 'Phase 1',
      pillStyle: 'phase1',
      bodyType: 'prose',
      body: {
        paragraphs: [
          'Designate a policy director as lead on a bill, with automatic email notification on assignment. Government Affairs also receives notifications when a tracked bill (High, Low, or Watching) has a status change. Depends on resolving roles and permissions first.',
        ],
      },
    },
    {
      id: 'ai',
      icon: '✨',
      iconBg: 'var(--purple-bg)',
      title: 'AI Enhancements',
      pill: 'Phase 2',
      pillStyle: 'phase2',
      bodyType: 'fieldTable',
      body: { columns: ['Feature', 'Description'], rows: AI_FEATURES },
    },
    {
      id: 'questions',
      icon: '❓',
      iconBg: 'var(--red-bg)',
      title: 'Open Questions',
      pill: '7 Gaps',
      pillStyle: 'discovery',
      bodyType: 'questions',
      body: { items: OPEN_QUESTIONS },
    },
    {
      id: 'actions',
      icon: '✅',
      iconBg: 'var(--green-bg)',
      title: 'Action Items',
      pill: 'Next Steps',
      pillStyle: 'phase1kpi',
      bodyType: 'actions',
      body: { items: ACTION_ITEMS },
    },
  ];

  const ACTION_STORAGE_KEY = 'mak-bt-action-items';
  const OPENQ_STORAGE_PREFIX = 'mak-bt-openq-';
  const OPENQ_RESOLUTION_PREFIX = 'mak-bt-openq-resolution-';

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderTag(tag) {
    if (!tag) return '';
    const variant = tag.variant === 'risk' ? ' risk' : tag.variant === 'new' ? ' new' : ' default';
    return `<span class="tag-inline${variant}">${escapeHtml(tag.label)}</span>`;
  }

  function renderFieldRow(row) {
    const desc = escapeHtml(row.description) +
      (row.tag ? ` ${renderTag(row.tag)}` : '') +
      (row.descriptionSuffix ? escapeHtml(row.descriptionSuffix) : '');
    return `<tr><td class="field-name">${escapeHtml(row.field)}</td><td>${desc}</td></tr>`;
  }

  function renderFieldTable(columns, rows) {
    const header = columns.map(col => `<th scope="col">${escapeHtml(col)}</th>`).join('');
    const body = rows.map(renderFieldRow).join('');
    return `<table><thead><tr>${header}</tr></thead><tbody>${body}</tbody></table>`;
  }

  function renderOverview(body) {
    const challenge = body.challenge.map(item => `<li>${escapeHtml(item)}</li>`).join('');
    const goal = body.goal.map(item => `<li>${escapeHtml(item)}</li>`).join('');
    const callouts = body.callouts.map(callout => `
      <div class="callout ${callout.variant}">
        <span class="callout-icon" aria-hidden="true">${callout.icon}</span>
        <p><strong>${escapeHtml(callout.label)}</strong> ${escapeHtml(callout.text)}</p>
      </div>
    `).join('');
    return `
      <div class="two-col">
        <div class="info-card">
          <h4>The Challenge</h4>
          <ul>${challenge}</ul>
        </div>
        <div class="info-card">
          <h4>The Goal</h4>
          <ul>${goal}</ul>
        </div>
      </div>
      ${callouts}
    `;
  }

  function renderRecordGrid(body) {
    const cards = body.records.map(record => `
      <article class="record-card ${record.kind}">
        <span class="record-tag">${escapeHtml(record.tag)}</span>
        <h3>${escapeHtml(record.title)}</h3>
        <p>${escapeHtml(record.description)}</p>
      </article>
    `).join('');
    return `<p class="section-intro">${escapeHtml(body.intro)}</p><div class="record-grid">${cards}</div>`;
  }

  function renderProse(body) {
    return body.paragraphs.map(p => `<p class="section-intro">${escapeHtml(p)}</p>`).join('');
  }

  function renderCrossCycle(body) {
    return `<p class="section-intro">${escapeHtml(body.intro)}</p>${renderFieldTable(body.columns, body.rows)}`;
  }

  function renderRoadmap(body) {
    return body.phases.map(phase => `
      <div class="phase-banner ${phase.variant}">
        <div class="phase-num">${escapeHtml(phase.num)}</div>
        <div>
          <h3>${escapeHtml(phase.title)}</h3>
          <p>${escapeHtml(phase.text)}</p>
        </div>
      </div>
    `).join('');
  }

  function renderQuestions(body) {
    const items = body.items.map((item, index) => `
      <div class="q-item" data-index="${index}" role="checkbox" aria-checked="false" tabindex="0">
        <div class="q-num">
          <span class="q-num-label">${index + 1}</span>
          <span class="q-check" aria-hidden="true">✓</span>
        </div>
        <div class="q-body">
          <div class="q-head-row">
            <span class="q-title">${escapeHtml(item.title)}</span>
            <span class="q-status ${item.statusVariant}">${escapeHtml(item.status)}</span>
          </div>
          <p class="q-desc">${escapeHtml(item.description)}</p>
        </div>
      </div>
    `).join('');
    return `<div class="question-list" id="question-list">${items}</div>`;
  }

  function renderActions(body) {
    const items = body.items.map((item, index) => `
      <div class="action-item" data-index="${index}" role="checkbox" aria-checked="false" tabindex="0">
        <span class="action-check" aria-hidden="true">✓</span>
        <div class="action-content">
          <p class="action-text">${escapeHtml(item.text)}</p>
          <div class="action-meta">${escapeHtml(item.owner)}</div>
        </div>
        <span class="action-owner ${item.ownerClass}">Pipeline</span>
      </div>
    `).join('');
    return `
      <div class="action-list-header">
        <button type="button" class="action-reset" id="action-reset-all">Reset all</button>
      </div>
      <div class="action-list" id="action-list">${items}</div>
    `;
  }

  function renderSectionBody(section) {
    switch (section.bodyType) {
      case 'overview': return renderOverview(section.body);
      case 'recordGrid': return renderRecordGrid(section.body);
      case 'prose': return renderProse(section.body);
      case 'fieldTable': return renderFieldTable(section.body.columns, section.body.rows);
      case 'crossCycle': return renderCrossCycle(section.body);
      case 'roadmap': return renderRoadmap(section.body);
      case 'questions': return renderQuestions(section.body);
      case 'actions': return renderActions(section.body);
      default: return '';
    }
  }

  function renderHero() {
    const metaLines = PAGE_META.metaLines.map(line => `${line}<br>`).join('');
    document.getElementById('hero').innerHTML = `
      <div>
        <p class="eyebrow">${escapeHtml(PAGE_META.eyebrow)}</p>
        <h1>${escapeHtml(PAGE_META.title)}<span>${escapeHtml(PAGE_META.accent)}</span></h1>
      </div>
      <div class="meta">
        ${metaLines}
        Prepared by ${escapeHtml(PAGE_META.preparedBy)}<br>
        <span class="confidential">Confidential</span>
      </div>
    `;
  }

  function renderToc() {
    document.getElementById('toc').innerHTML = TOC_ITEMS.map(item => `
      <li>
        <a class="toc-item" href="#${item.id}">
          <span class="toc-icon" aria-hidden="true">${item.icon}</span>
          ${escapeHtml(item.label)}
        </a>
      </li>
    `).join('');
  }

  function renderSections() {
    const container = document.getElementById('sections');
    container.innerHTML = SECTIONS.map(section => {
      const pillHtml = section.pill
        ? `<span class="badge" style="${PILL_STYLES[section.pillStyle]}">${escapeHtml(section.pill)}</span>`
        : '';
      const expanded = section.defaultOpen ? 'true' : 'false';
      const hidden = section.defaultOpen ? '' : ' hidden';
      return `
        <section class="section" id="${section.id}">
          <button
            type="button"
            class="section-toggle"
            id="toggle-${section.id}"
            aria-expanded="${expanded}"
            aria-controls="body-${section.id}"
          >
            <span class="section-icon" style="background:${section.iconBg};" aria-hidden="true">${section.icon}</span>
            <h2>${escapeHtml(section.title)}</h2>
            ${pillHtml}
            <span class="chevron" aria-hidden="true">▼</span>
          </button>
          <div class="section-body" id="body-${section.id}" role="region"${hidden}>
            ${renderSectionBody(section)}
          </div>
        </section>
      `;
    }).join('');

    container.querySelectorAll('.section-toggle').forEach(button => {
      button.addEventListener('click', () => toggleSection(button));
    });
  }

  function toggleSection(button) {
    const expanded = button.getAttribute('aria-expanded') === 'true';
    const body = document.getElementById(button.getAttribute('aria-controls'));
    button.setAttribute('aria-expanded', expanded ? 'false' : 'true');
    body.hidden = expanded;
  }

  function openSection(id) {
    const button = document.getElementById(`toggle-${id}`);
    const body = document.getElementById(`body-${id}`);
    if (button && body) {
      button.setAttribute('aria-expanded', 'true');
      body.hidden = false;
    }
    const section = document.getElementById(id);
    if (section) {
      section.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }

  function initTocNavigation() {
    document.querySelectorAll('.toc-item').forEach(link => {
      link.addEventListener('click', event => {
        event.preventDefault();
        const id = link.getAttribute('href').slice(1);
        openSection(id);
        history.replaceState(null, '', `#${id}`);
      });
    });

    if (location.hash) {
      const id = location.hash.slice(1);
      if (document.getElementById(id)) {
        openSection(id);
      }
    }
  }

  // ── Action items ──
  function getActionStates() {
    try {
      return JSON.parse(localStorage.getItem(ACTION_STORAGE_KEY) || '{}');
    } catch {
      return {};
    }
  }

  function saveActionState(index, checked) {
    const states = getActionStates();
    if (checked) {
      states[index] = true;
    } else {
      delete states[index];
    }
    localStorage.setItem(ACTION_STORAGE_KEY, JSON.stringify(states));
  }

  function setActionChecked(item, checked) {
    item.classList.toggle('checked', checked);
    item.setAttribute('aria-checked', checked ? 'true' : 'false');
    saveActionState(item.dataset.index, checked);
  }

  function toggleActionItem(item) {
    setActionChecked(item, !item.classList.contains('checked'));
  }

  function restoreActionItems() {
    const states = getActionStates();
    const hasStored = Object.keys(states).length > 0;
    document.querySelectorAll('.action-item').forEach(item => {
      const index = item.dataset.index;
      if (hasStored) {
        if (states[index]) setActionChecked(item, true);
      } else if (ACTION_ITEMS[index]?.defaultChecked) {
        setActionChecked(item, true);
      }
    });
  }

  function initActionItems() {
    document.querySelectorAll('.action-item').forEach(item => {
      item.addEventListener('click', () => toggleActionItem(item));
      item.addEventListener('keydown', e => {
        if (e.key === ' ' || e.key === 'Enter') {
          e.preventDefault();
          toggleActionItem(item);
        }
      });
    });

    const resetBtn = document.getElementById('action-reset-all');
    if (resetBtn) {
      resetBtn.addEventListener('click', e => {
        e.stopPropagation();
        localStorage.removeItem(ACTION_STORAGE_KEY);
        document.querySelectorAll('.action-item').forEach(item => {
          setActionChecked(item, false);
        });
        document.querySelectorAll('#questions .q-item').forEach(item => {
          setOpenQChecked(item, false);
        });
        clearOpenQResolutions();
      });
    }

    restoreActionItems();
  }

  // ── Open questions ──
  function openQStorageKey(index) {
    return OPENQ_STORAGE_PREFIX + index;
  }

  function openQResolutionKey(index) {
    return OPENQ_RESOLUTION_PREFIX + index;
  }

  function saveOpenQState(index, checked) {
    const key = openQStorageKey(index);
    if (checked) {
      localStorage.setItem(key, 'true');
    } else {
      localStorage.removeItem(key);
    }
  }

  function saveOpenQResolution(index, value) {
    const key = openQResolutionKey(index);
    if (value.trim()) {
      localStorage.setItem(key, value);
    } else {
      localStorage.removeItem(key);
    }
  }

  function setOpenQChecked(item, checked) {
    item.classList.toggle('checked', checked);
    item.setAttribute('aria-checked', checked ? 'true' : 'false');
    saveOpenQState(item.dataset.index, checked);
    const resolution = item.querySelector('.q-resolution');
    if (resolution) resolution.hidden = !checked;
  }

  function toggleOpenQItem(item) {
    setOpenQChecked(item, !item.classList.contains('checked'));
  }

  function initOpenQResolutionFields() {
    document.querySelectorAll('#questions .q-item').forEach(item => {
      const index = item.dataset.index;
      const body = item.querySelector('.q-body');
      if (body.querySelector('.q-resolution')) return;

      const wrap = document.createElement('div');
      wrap.className = 'q-resolution';
      wrap.hidden = !item.classList.contains('checked');

      const label = document.createElement('label');
      label.className = 'q-resolution-label';
      label.textContent = 'Resolution';
      label.setAttribute('for', `q-resolution-${index}`);

      const textarea = document.createElement('textarea');
      textarea.className = 'q-resolution-input';
      textarea.id = `q-resolution-${index}`;
      textarea.placeholder = 'What was decided or found...';
      textarea.rows = 2;

      const saved = localStorage.getItem(openQResolutionKey(index));
      if (saved) textarea.value = saved;

      wrap.appendChild(label);
      wrap.appendChild(textarea);
      body.appendChild(wrap);

      let debounceTimer;
      textarea.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => saveOpenQResolution(index, textarea.value), 300);
      });
      textarea.addEventListener('blur', () => saveOpenQResolution(index, textarea.value));
      wrap.addEventListener('click', e => e.stopPropagation());
      textarea.addEventListener('keydown', e => e.stopPropagation());
    });
  }

  function clearOpenQResolutions() {
    document.querySelectorAll('#questions .q-item').forEach(item => {
      localStorage.removeItem(openQResolutionKey(item.dataset.index));
      const textarea = item.querySelector('.q-resolution-input');
      if (textarea) textarea.value = '';
    });
  }

  function restoreOpenQItems() {
    document.querySelectorAll('#questions .q-item').forEach(item => {
      if (localStorage.getItem(openQStorageKey(item.dataset.index))) {
        setOpenQChecked(item, true);
      }
    });
  }

  function initOpenQuestions() {
    initOpenQResolutionFields();

    document.querySelectorAll('#questions .q-item').forEach(item => {
      item.addEventListener('click', e => {
        if (e.target.closest('.q-resolution')) return;
        toggleOpenQItem(item);
      });
      item.addEventListener('keydown', e => {
        if (e.target.closest('.q-resolution')) return;
        if (e.key === ' ' || e.key === 'Enter') {
          e.preventDefault();
          toggleOpenQItem(item);
        }
      });
    });

    restoreOpenQItems();
  }

  function init() {
    renderHero();
    renderToc();
    renderSections();
    document.getElementById('footer-note').textContent = PAGE_META.footer;
    initTocNavigation();
    initOpenQuestions();
    initActionItems();
  }

  init();
</script>
</body>
</html>
